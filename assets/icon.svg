  <circle cx="297" cy="247" r="14" fill="#5558a8"/>
  <circle cx="357" cy="247" r="14" fill="#5558a8"/>
  <!-- Frown -->
  <path d="M 291 302 Q 327 272 363 302" fill="none" stroke="#5558a8" stroke-width="13" stroke-linecap="round"/>

  <!-- Comedy mask (front, left) -->
