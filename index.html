<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empires Game</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>

<body>
    <div class="container">
        <!-- Input Screen -->
        <div id="inputScreen">
            <h1>🎭 Empires</h1>

            <div class="input-section">
                <input type="text" id="wordInput" placeholder="Enter your word..." />
                <button class="button button-primary" onclick="addWord()">
                    Add Word
                </button>
            </div>

            <div id="wordListContainer" class="hidden">
                <div class="word-count" id="wordCount"></div>

                <button class="button button-secondary" onclick="startReveal()">
                    Done - Start Revealing
                </button>

                <button class="button button-danger" onclick="resetGame()">
                    Reset Game
                </button>
            </div>
        </div>

        <!-- Reveal Screen -->
        <div id="revealScreen" class="hidden">
            <h1>🎭 Empires</h1>

            <div class="reveal-section">
                <div class="word-counter" id="wordCounter"></div>

                <div class="current-word" id="currentWord"></div>

                <div class="button-group">
                    <button class="button button-primary" id="prevBtn" onclick="previousWord()">
                        ← Previous
                    </button>
                    <button class="button button-primary" id="nextBtn" onclick="nextWord()">
                        Next →
                    </button>
                </div>

                <button class="button button-danger" onclick="resetGame()">
                    Reset Game
                </button>
            </div>
        </div>
    </div>

    <script src="assets/script.js"></script>
</body>

</html>
